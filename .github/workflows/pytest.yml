name: Python Tests

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]

jobs:
  # --------------------------------------------------------------------------
  # Fast feedback for every PR: dataProcess + imports only. Skips the
  # rawDataReader fixtures (the slow part of the suite).
  # --------------------------------------------------------------------------
  quick:
    name: quick (dataProcess) py${{ matrix.python-version }}
    strategy:
      fail-fast: false
      matrix:
        python-version: [ "3.10", "3.11", "3.12", "3.13", "3.14" ]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: 'pip'
      - name: Install gfortran
        run: sudo apt-get update && sudo apt-get install -y gfortran
      - name: Install
        # Non-editable install: pip builds the wheel once, installs it,
        # and the test run uses the installed package. Avoids
        # meson-python's editable-rebuild-on-import path (which needs
        # ninja in the runtime env after the build-isolation env is
        # cleaned up).
        run: |
          python -m pip install --upgrade pip
          pip install ".[test]"
      - name: Run tests
        run: |
          pytest tests/test_imports.py tests/test_dataprocess/ \
            --cov=AeroViz \
            --cov-report=term-missing \
            --cov-report=xml \
            -v
      - name: Upload coverage
        uses: actions/upload-artifact@v4
        with:
          name: coverage-quick-py${{ matrix.python-version }}-${{ github.sha }}
          path: coverage.xml
          if-no-files-found: error

  # --------------------------------------------------------------------------
  # Full reader pipeline. Slower; runs on push to main/master and on PRs
  # that touch the reader code (matrix kept narrower to save CI minutes).
  # --------------------------------------------------------------------------
  readers:
    name: readers py${{ matrix.python-version }}
    needs: quick
    strategy:
      fail-fast: false
      matrix:
        python-version: [ "3.12", "3.14" ]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: 'pip'
      - name: Install gfortran
        run: sudo apt-get update && sudo apt-get install -y gfortran
      - name: Install
        # Non-editable install: pip builds the wheel once, installs it,
        # and the test run uses the installed package. Avoids
        # meson-python's editable-rebuild-on-import path (which needs
        # ninja in the runtime env after the build-isolation env is
        # cleaned up).
        run: |
          python -m pip install --upgrade pip
          pip install ".[test]"
      - name: Run reader tests
        run: |
          pytest tests/test_readers/ -m "not requires_data" \
            --cov=AeroViz \
            --cov-report=term-missing \
            --cov-report=xml \
            -v
      - name: Upload coverage
        uses: actions/upload-artifact@v4
        with:
          name: coverage-readers-py${{ matrix.python-version }}-${{ github.sha }}
          path: coverage.xml
          if-no-files-found: error
