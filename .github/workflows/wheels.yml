name: Build wheels

on:
  # Build wheels on every tag push (v* triggers a release).
  push:
    tags:
      - 'v*'
  # Allow manual runs from the Actions UI for testing.
  workflow_dispatch:

jobs:
  build_wheels:
    name: ${{ matrix.os }} cp${{ matrix.python }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        # macos-13 = Intel; macos-14 = Apple Silicon
        os: [ubuntu-latest, macos-13, macos-14, windows-latest]
        python: ['310', '311', '312', '313', '314']

    steps:
      - uses: actions/checkout@v4

      # cibuildwheel handles Python + isolated build env per row of the
      # matrix; we only need gfortran in the *runner* env so the build
      # step inside the container can find it.
      - name: Install gfortran (Linux/macOS)
        if: runner.os != 'Windows'
        shell: bash
        run: |
          if [[ "$RUNNER_OS" == "Linux" ]]; then
            sudo apt-get update
            sudo apt-get install -y gfortran
          else
            # macOS — gfortran comes with the gcc Homebrew bottle
            brew install gcc
          fi

      - name: Install rtools (Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          # rtools45 ships gfortran for Windows builds; the path is
          # injected into the cibuildwheel env via CIBW_ENVIRONMENT.
          choco install rtools -y --no-progress --version=45

      - uses: pypa/cibuildwheel@v2.21
        env:
          CIBW_BUILD: cp${{ matrix.python }}-*
          # Skip 32-bit (i686), musllinux, and PyPy — narrow to the
          # configurations we actually want to ship.
          CIBW_SKIP: "*-musllinux_* *-manylinux_i686 *_i686 pp*"
          CIBW_ARCHS_LINUX: x86_64
          CIBW_ARCHS_MACOS: ${{ matrix.os == 'macos-14' && 'arm64' || 'x86_64' }}
          CIBW_ARCHS_WINDOWS: AMD64
          # Each isolated cibuildwheel build env must also have meson
          # tools + numpy headers available.
          CIBW_BUILD_FRONTEND: build
          CIBW_ENVIRONMENT_WINDOWS: >-
            PATH="C:\\rtools45\\x86_64-w64-mingw32.static.posix\\bin;C:\\rtools45\\usr\\bin;$PATH"
          # Run the import + a couple of cheap solver calls so a broken
          # wheel never escapes.
          CIBW_TEST_COMMAND: >-
            python -c "
            import numpy as np;
            from AeroViz.dataProcess.Chemistry._isorropia import solve;
            wi = np.array([5e-9, 5.2e-8, 2e-7, 4.8e-8, 5e-9, 1e-9, 1e-9, 5e-10]);
            cntrl = np.array([0.0, 1.0]);
            _ = solve(wi, 0.8, 298.0, cntrl);
            print('isorropia smoke test OK')
            "

      - uses: actions/upload-artifact@v4
        with:
          name: wheels-${{ matrix.os }}-cp${{ matrix.python }}
          path: ./wheelhouse/*.whl
          if-no-files-found: error

  build_sdist:
    name: Source distribution
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - name: Install build deps
        run: |
          sudo apt-get update
          sudo apt-get install -y gfortran
          python -m pip install --upgrade pip build
      - name: Build sdist
        run: python -m build --sdist
      - uses: actions/upload-artifact@v4
        with:
          name: sdist
          path: dist/*.tar.gz
          if-no-files-found: error
