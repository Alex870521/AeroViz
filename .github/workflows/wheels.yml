name: Release

on:
  push:
    tags:
      - 'v*'
  # Manual trigger lets us dry-run the wheel build without tagging.
  # Publish jobs are gated below, so workflow_dispatch never touches PyPI.
  workflow_dispatch:

jobs:
  # ----------------------------------------------------------------------
  # 1. Sanity-check that pyproject.toml's version matches the tag.
  #    Cheap; runs first so a mismatched version aborts before we spend
  #    20 wheel-building minutes.
  # ----------------------------------------------------------------------
  verify-version:
    if: startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - name: Compare tag vs pyproject version
        run: |
          TAG_VERSION=${GITHUB_REF#refs/tags/v}
          PKG_VERSION=$(python -c "
          import tomllib, pathlib
          print(tomllib.loads(pathlib.Path('pyproject.toml').read_text())['project']['version'])
          ")
          echo "Tag:     $TAG_VERSION"
          echo "Package: $PKG_VERSION"
          if [ "$PKG_VERSION" != "$TAG_VERSION" ]; then
            echo "::error::version mismatch — bump pyproject.toml [+ meson.build] before tagging"
            exit 1
          fi

  # ----------------------------------------------------------------------
  # 2. Build platform-specific wheels: 4 OS x 5 Python = 20 wheels.
  # ----------------------------------------------------------------------
  build-wheels:
    # On tag push we depend on verify-version; on workflow_dispatch
    # there's no tag so verify-version is skipped and we always run.
    needs: [verify-version]
    if: |
      always() &&
      (needs.verify-version.result == 'success' || needs.verify-version.result == 'skipped')
    name: ${{ matrix.os }} cp${{ matrix.python }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        # macos-13 = Intel; macos-14 = Apple Silicon
        # Windows is deferred to a follow-up release — getting gfortran
        # to play nicely with MSVC inside a cibuildwheel isolated env
        # needs an MSYS2 / rtools-45 setup we haven't validated yet.
        os: [ubuntu-latest, macos-13, macos-14]
        python: ['310', '311', '312', '313', '314']

    steps:
      - uses: actions/checkout@v4

      - name: Install gfortran (Linux/macOS)
        shell: bash
        run: |
          if [[ "$RUNNER_OS" == "Linux" ]]; then
            sudo apt-get update
            sudo apt-get install -y gfortran
            echo "FC=gfortran" >> $GITHUB_ENV
          else
            brew install gcc
            # Resolve the actual gfortran path: brew on Apple Silicon
            # puts it in /opt/homebrew/bin, on Intel in /usr/local/bin.
            # cibuildwheel's isolated build venv only sees a minimal
            # PATH, so propagate the Homebrew bin via $GITHUB_ENV and
            # set FC explicitly so meson skips compiler auto-detection.
            GFORTRAN_BIN=$(brew --prefix gcc)/bin/gfortran
            if [ ! -x "$GFORTRAN_BIN" ]; then
              # Fall back to the versioned name.
              GFORTRAN_BIN=$(ls "$(brew --prefix gcc)"/bin/gfortran-* 2>/dev/null | head -1)
            fi
            echo "Resolved gfortran: $GFORTRAN_BIN"
            echo "FC=$GFORTRAN_BIN" >> $GITHUB_ENV
            echo "$(brew --prefix gcc)/bin" >> $GITHUB_PATH
          fi

      - uses: pypa/cibuildwheel@v3.0
        env:
          CIBW_BUILD: cp${{ matrix.python }}-*
          # Skip 32-bit (i686), musllinux, and PyPy.
          CIBW_SKIP: "*-musllinux_* *-manylinux_i686 *_i686 pp*"
          # Opt into Python 3.14 (still tagged "prerelease" in some
          # cibuildwheel versions).
          CIBW_ENABLE: cpython-prerelease
          CIBW_ARCHS_LINUX: x86_64
          CIBW_ARCHS_MACOS: ${{ matrix.os == 'macos-14' && 'arm64' || 'x86_64' }}
          CIBW_BUILD_FRONTEND: build
          # Forward FC + the Homebrew gcc bin path into cibuildwheel's
          # isolated build env. $GITHUB_PATH made the bin available at
          # the runner level; CIBW_ENVIRONMENT_PASS_MACOS forwards FC
          # (and a couple of PATH variants) into the build subprocess.
          CIBW_ENVIRONMENT_PASS_MACOS: FC PATH
          CIBW_ENVIRONMENT_PASS_LINUX: FC
          # Smoke-test the wheel: import the package and call the new
          # Fortran extension once. A broken extension fails here, not
          # in PyPI users' hands.
          # NOTE: `python -I` runs in isolated mode (no cwd in
          # sys.path), so the source-tree `AeroViz/` package in the
          # project root can't shadow the installed wheel. One-liner
          # because YAML folded scalars keep leading whitespace, which
          # `python -c` reads as IndentationError.
          CIBW_TEST_COMMAND: python -I -c "import numpy as np; from AeroViz.dataProcess.Chemistry._isorropia import solve; solve(np.array([5e-9,5.2e-8,2e-7,4.8e-8,5e-9,1e-9,1e-9,5e-10]),0.8,298.0,np.array([0.0,1.0])); print('isorropia smoke test OK')"

      - uses: actions/upload-artifact@v4
        with:
          name: wheels-${{ matrix.os }}-cp${{ matrix.python }}
          path: ./wheelhouse/*.whl
          if-no-files-found: error

  # ----------------------------------------------------------------------
  # 3. Build the source distribution.
  # ----------------------------------------------------------------------
  build-sdist:
    needs: [verify-version]
    if: |
      always() &&
      (needs.verify-version.result == 'success' || needs.verify-version.result == 'skipped')
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - name: Install build deps
        run: |
          sudo apt-get update
          sudo apt-get install -y gfortran
          python -m pip install --upgrade pip build
      - name: Build sdist
        run: python -m build --sdist
      - uses: actions/upload-artifact@v4
        with:
          name: sdist
          path: dist/*.tar.gz
          if-no-files-found: error

  # ----------------------------------------------------------------------
  # 4. Publish to TestPyPI (tag pushes only).
  # ----------------------------------------------------------------------
  publish-test:
    needs: [build-wheels, build-sdist]
    if: startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-latest
    environment:
      name: test-pypi
      url: https://test.pypi.org/p/AeroViz
    permissions:
      id-token: write
    steps:
      - uses: actions/download-artifact@v4
        with:
          path: dist/
          merge-multiple: true
      - name: Publish to TestPyPI
        uses: pypa/gh-action-pypi-publish@release/v1
        with:
          repository-url: https://test.pypi.org/legacy/

  # ----------------------------------------------------------------------
  # 5. Publish to PyPI (only after TestPyPI succeeded).
  # ----------------------------------------------------------------------
  publish-prod:
    needs: [publish-test]
    if: startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-latest
    environment:
      name: pypi
      url: https://pypi.org/p/AeroViz
    permissions:
      id-token: write
    steps:
      - uses: actions/download-artifact@v4
        with:
          path: dist/
          merge-multiple: true
      - name: Publish to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1

  # ----------------------------------------------------------------------
  # 6. Create a GitHub release with the wheels and sdist attached.
  # ----------------------------------------------------------------------
  github-release:
    needs: [publish-prod]
    if: startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/download-artifact@v4
        with:
          path: dist/
          merge-multiple: true
      - name: Create GitHub release
        env:
          GITHUB_TOKEN: ${{ github.token }}
        run: |
          gh release create "${{ github.ref_name }}" \
            --repo "${{ github.repository }}" \
            --notes "Release ${{ github.ref_name }}. See docs/CHANGELOG.md for details." \
            dist/*
